<!DOCTYPE html>
<html lang="en">
<head>

            background: #007bff;

            text-align: center;

            background: white;

            margin: 10px;
            padding: 20px;
            width: 300px;
            text-align: center;
        }
        footer {
            background: #007bff;
            color: white;
            text-align: center;
            padding: 10px;
            position: relative;
            bottom: 0;
            width: 100%;
        }
